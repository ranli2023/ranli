<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
<title>计算器</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, sans-serif}
    html,body{width:100%;height:100%;background:#f5f5f7;overflow:hidden}

    .calculator{
        width:100vw;height:100vh;
        background:#fff;
        display:flex;flex-direction:column;
        padding:2vw;
        gap:1vw;
    }

    .screen{
        flex:0 0 16vh;
        background:#f8f8fa;
        border-radius:5vw;
        display:flex;align-items:center;justify-content:flex-end;
        padding:0 4vw;
        overflow:hidden;
    }
    .scroll{white-space:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .text{font-size:9vw;font-weight:600;color:#111;line-height:1}

    .keypad{
        flex:1;
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        grid-template-rows:repeat(7, 1fr);
        gap:1vw;
        height:100%;
    }

    .btn{
        width:100%;
        height:100%;
        border-radius:50%;
        border:none;
        font-size:clamp(14px, 4vw, 24px);
        font-weight:500;
        background:#f0f0f2;color:#000;
        box-shadow:0 0.3vw 0.6vw rgba(0,0,0,0.05);
        display:flex;align-items:center;justify-content:center;
        transition:transform 0.1s ease;
    }
    .btn:active{transform:scale(0.95)}

    .func{background:#d4d4d8}
    .op{background:#ffb800;color:#fff}
</style>
</head>
<body>

<div class="calculator">
    <div class="screen">
        <div class="scroll" id="scrollBox"><div class="text" id="d">0</div></div>
    </div>

    <div class="keypad">
        <button class="btn func" onclick="clr()">清空</button>
        <button class="btn func" onclick="neg()">正负</button>
        <button class="btn func" onclick="pi()">π</button>
        <button class="btn func" onclick="mod()">取模</button>

        <button class="btn func" onclick="sin()">正弦</button>
        <button class="btn func" onclick="cos()">余弦</button>
        <button class="btn func" onclick="tan()">正切</button>
        <button class="btn func" onclick="pct()">百分</button>

        <button class="btn func" onclick="sqrt()">开方</button>
        <button class="btn func" onclick="sqr()">平方</button>
        <button class="btn func" onclick="cube()">立方</button>
        <button class="btn op" onclick="op('^')">次方</button>

        <button class="btn num" onclick="num('7')">7</button>
        <button class="btn num" onclick="num('8')">8</button>
        <button class="btn num" onclick="num('9')">9</button>
        <button class="btn op" onclick="op('÷')">÷</button>

        <button class="btn num" onclick="num('4')">4</button>
        <button class="btn num" onclick="num('5')">5</button>
        <button class="btn num" onclick="num('6')">6</button>
        <button class="btn op" onclick="op('×')">×</button>

        <button class="btn num" onclick="num('1')">1</button>
        <button class="btn num" onclick="num('2')">2</button>
        <button class="btn num" onclick="num('3')">3</button>
        <button class="btn op" onclick="op('-')">−</button>

        <button class="btn num" onclick="num('0')">0</button>
        <button class="btn num" onclick="num('.')">.</button>
        <button class="btn op" onclick="eq()">＝</button>
        <button class="btn op" onclick="op('+')">＋</button>
    </div>
</div>

<script>
let d = '0';
let a = 0, o = null, w = false;
const el = document.getElementById('d');
const box = document.getElementById('scrollBox');

function fmt(n){
    if(isNaN(n)||!isFinite(n))return"错误";
    return Number(n.toFixed(8)).toString();
}

function up(){
    el.innerText=d;
    setTimeout(()=>{box.scrollLeft=box.scrollWidth},10);
}

function num(n){
    if(w){d=n=='.'?'0.':n;w=false;}
    else{
        if(d=='0'&&n!=='.')d=n;
        else if(n=='.'&&d.includes('.'))return;
        else d+=n;
    }
    up();
}

function neg(){d=fmt(-parseFloat(d));w=true;up();}
function pi(){d='3.1415926535';w=true;up();}
function mod(){op('mod');}

function sin(){d=fmt(Math.sin(parseFloat(d)*Math.PI/180));w=true;up();}
function cos(){d=fmt(Math.cos(parseFloat(d)*Math.PI/180));w=true;up();}
function tan(){d=fmt(Math.tan(parseFloat(d)*Math.PI/180));w=true;up();}

function sqrt(){
    let v=parseFloat(d);
    d=v<0?"错误":fmt(Math.sqrt(v));
    w=true;up();
}
function sqr(){d=fmt(parseFloat(d)**2);w=true;up();}
function cube(){d=fmt(parseFloat(d)**3);w=true;up();}
function pct(){
    let v=parseFloat(d);
    d=o?fmt(a*v/100):fmt(v/100);
    if(o)w=true;up();
}

function op(x){
    const v=parseFloat(d);
    if(o&&!w){
        let r;
        if(o=='+')r=a+v;
        else if(o=='-')r=a-v;
        else if(o=='×')r=a*v;
        else if(o=='÷')r=v===0?"错误":a/v;
        else if(o=='^')r=a**v;
        else if(o=='mod')r=a%v;
        d=r=="错误"?r:fmt(r);
        a=r=="错误"?0:r;
    }else{a=v;}
    o=x;w=true;up();
}

function eq(){
    if(!o||w)return;
    const v=parseFloat(d);
    let r;
    if(o=='+')r=a+v;
    else if(o=='-')r=a-v;
    else if(o=='×')r=a*v;
    else if(o=='÷')r=v===0?"错误":a/v;
    else if(o=='^')r=a**v;
    else if(o=='mod')r=a%v;
    d=r=="错误"?r:fmt(r);
    o=null;w=true;up();
}

function clr(){d='0';a=0;o=null;w=false;up();}
up();
</script>
</body>
</html>
