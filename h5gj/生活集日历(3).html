// ================== 农历计算 ==================
const LUNAR_BASE = new Date(2025,0,29);
function solarToLunar(y,m,d){
  const now = new Date(y,m-1,d);
  const diff = Math.floor((now - LUNAR_BASE) / 86400000);
  let ly=2025,lm=1,ld=1,isLeap=false;
  let rest = diff;
  if(rest>=0){
    while(rest>0){
      ld++;
      const yd = LUNAR_DATA[ly];
      if(ld>yd.months[lm]){
        ld=1;
        if(yd.leap && lm===yd.leap && !isLeap) isLeap=true;
        else{ isLeap=false; lm++; if(lm>12){lm=1;ly++;} }
      }
      rest--;
    }
  }else{
    rest=-rest;
    while(rest>0){
      ld--;
      if(ld<1){
        const yd=LUNAR_DATA[ly];
        if(yd.leap&&lm===yd.leap+1&&isLeap){ isLeap=false; ld=yd.leapDays; }
        else{
          lm--; isLeap=false; if(lm<1){ly--;lm=12;}
          ld=yd.months[lm];
          if(yd.leap&&lm===yd.leap){ isLeap=true; ld=yd.leapDays; }
        }
      }
      rest--;
    }
  }
  const dNames = ["","初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
  return { lunarDisplay:dNames[ld], lunarMonth:lm, lunarDay:ld, isLeap };
}

// ================== 甲子纪年 ==================
function getJiaZiYear(year){
  const base=1984;
  const offset=year-base;
  const gan=TIANGAN[offset%10];
  const zhi=DIZHI[offset%12];
  const sx=SHENGXIAO[offset%12];
  return gan+zhi+"年（"+sx+"年）";
}

// ================== 全局日期 ==================
let selY,selM,selD;
let now=new Date();
let cy=now.getFullYear();
let cm=now.getMonth()+1;

// ================== 黄历 ==================
function getAlmanac(y,m,d){
  const cur=new Date(y,m-1,d);
  const diff=Math.floor((cur-LUNAR_BASE)/86400000);
  const gz=(diff+39)%60;
  const gan=TIANGAN[gz%10];
  const zhi=DIZHI[gz%12];
  const sx=SHENGXIAO[(y-1984+12)%12];
  const jian=JIANS[diff%12];
  const xiu=XIUS[diff%28];
  const chong=`冲${DIZHI[(gz%12+6)%12]} 煞${["东","南","西","北"][gz%4]}`;
  const cai=CAISHEN[gz%12]+"方";
  const xi=XISHEN[gz%12]+"方";
  return { ganzhi:gan+zhi, sx, jian, xiu, chong, cai, xi, yi:YI_FULL[jian], ji:JI_FULL[jian] };
}

      <div class="yi-ji-title">宜</div><div class="tags">${alm.yi.map(t=>`<span class="tag yi">${t}</span>`).join('')}</div>
      <div class="yi-ji-title">忌</div><div class="tags">${alm.ji.map(t=>`<span class="tag ji">${t}</span>`).join('')}</div>
    </div>
  `;

  document.getElementById("result").innerHTML=res;

// ================== 日历渲染 ==================
function render(){
  document.getElementById("solarTitle").innerText=`${cy}年${cm}月`;
  document.getElementById("lunarTitle").innerText=getJiaZiYear(cy);
  const grid=document.getElementById("daysGrid");
  grid.innerHTML="";
  const first=new Date(cy,cm-1,1).getDay();
  const days=new Date(cy,cm,0).getDate();

  for(let i=0;i<first;i++)grid.innerHTML+=`<div class="day other"></div>`;
  for(let d=1;d<=days;d++){
    const key=`${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const lunar=solarToLunar(cy,cm,d);
    const lkey=`${lunar.lunarMonth}-${lunar.lunarDay}`;
    const isToday=cy==now.getFullYear()&&cm==now.getMonth()+1&&d==now.getDate();
    let info='',icon='';

    if(SOLAR_FESTIVALS[key]){
      info=`<span class="festival-text">${SOLAR_FESTIVALS[key]}</span>`;
      icon=SOLAR_ICONS[SOLAR_FESTIVALS[key]];
    }else if(LUNAR_FESTIVALS[lkey]){
      info=`<span class="festival-text">${LUNAR_FESTIVALS[lkey]}</span>`;
      icon=LUNAR_ICONS[LUNAR_FESTIVALS[lkey]];
    }else if(TERMS[key]){
      info=`<span class="term-text">${TERMS[key]}</span>`;
      icon=TERM_ICONS[TERMS[key]];
    }else{
      if(lunar.lunarDay===1){
        const monthText=lunar.isLeap?"闰"+MONTH_NAMES[lunar.lunarMonth]:MONTH_NAMES[lunar.lunarMonth];
        info=`<span class="month-title">${monthText}</span>`;
      }else{
        info=`<span class="lunar-text">${lunar.lunarDisplay}</span>`;
      }
    }

    grid.innerHTML+=`
<div class="day ${isToday?'today':''}" onclick="openPanel(${cy},${cm},${d})">
  <div class="day-num">${d}</div>
  <div class="day-info">${info}</div>
  <div class="day-icon">${icon}</div>
</div>`;
  }
}

function prevMonth(){cm--;if(cm<1){cm=12;cy--;}render();}
function nextMonth(){cm++;if(cm>12){cm=1;cy++;}render();}

render();
